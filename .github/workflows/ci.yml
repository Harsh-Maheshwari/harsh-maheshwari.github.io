name: deploy_mkdocs
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: 3.x
      - run: if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - run: mkdocs gh-deploy --force
